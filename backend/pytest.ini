[pytest]
# Django settings module
DJANGO_SETTINGS_MODULE = config.settings

# Python path
pythonpath = .

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test* *Tests
python_functions = test_*

# Test paths
testpaths = apps core

# Output options
addopts =
    # Verbose output
    -v
    # Show extra test summary info
    -ra
    # Show local variables in tracebacks
    -l
    # Strict markers - fail on unknown markers
    --strict-markers
    # Strict config - fail on config issues
    --strict-config
    # Coverage options
    --cov=apps
    --cov=core
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
    # Disable warnings summary for cleaner output
    --disable-warnings
    # Reuse database between test runs for speed
    --reuse-db
    # Run tests in parallel (auto-detect CPU count)
    -n auto
    # Show durations of slowest tests
    --durations=10

# Markers for categorizing tests
markers =
    unit: Unit tests that test individual components in isolation
    integration: Integration tests that test multiple components together
    slow: Tests that take a long time to run
    websocket: Tests for WebSocket consumers
    celery: Tests for Celery tasks
    ami: Tests for Asterisk AMI integration
    api: Tests for API endpoints
    model: Tests for Django models
    performance: Performance and load tests
    property: Property-based tests

# Django-specific options
django_find_project = false

# Asyncio mode for async tests
asyncio_mode = auto

# Ignore paths
norecursedirs = 
    .git
    .tox
    dist
    build
    *.egg
    __pycache__
    .venv
    venv
    env
    node_modules
    migrations
    static
    media
    recordings
    htmlcov

# Minimum Python version
minversion = 3.11

# Console output style
console_output_style = progress

# Timeout for tests (in seconds) - prevent hanging tests
timeout = 300

# Fail on first error (useful for debugging, comment out for full test runs)
# -x

# Stop after N failures (useful for debugging)
# --maxfail=5
