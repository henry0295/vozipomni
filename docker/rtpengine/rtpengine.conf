[rtpengine]
# ============================================================================
# VoziPOmni RTPEngine Configuration
# ============================================================================
#
# table=-1: modo userspace-only (sin módulo kernel rtpengine).
# En Docker/host sin el módulo cargado, table=0 provoca fallo al arrancar
# (exit 255) → Kamailio no transforma SDP → Asterisk responde 488 Incompatible SDP.
table = -1

# Interface: se reemplaza con la IP real del servidor por entrypoint.sh
# usando sed sobre __INTERFACE_IP__.
#
# Formato con NAT:   <IP_privada>!<IP_publica>
# Formato sin NAT:   <IP_publica>
#
# El nombre "public" le indica a RTPEngine qué candidatos ICE incluir en el SDP.
# CRÍTICO: Si este valor es incorrecto, el browser WebRTC no puede conectarse
#          al RTPEngine → llamada conecta pero sin audio.
interface = public/__INTERFACE_IP__

# Puerto de control NG (Kamailio → RTPEngine vía UDP)
listen-ng = 22222

# ============================================================================
# Rango de puertos RTP/RTCP para sesiones de audio
# Cada llamada usa 2 puertos (RTP + RTCP). Con 300 puertos = 150 llamadas simultáneas.
# Asegurarse que el firewall permita UDP 23000-23300 desde/hacia cualquier IP.
# ============================================================================
port-min = 23000
port-max = 23300

# ============================================================================
# Redis — persistencia de sesiones de audio
# Sin Redis: si RTPEngine se reinicia, TODAS las llamadas activas pierden audio.
# Con Redis: RTPEngine restaura las sesiones al reiniciar.
# IMPORTANTE: usar la IP del host (red host) no el nombre de servicio,
# porque en network_mode:host el DNS de Docker no está disponible.
# El entrypoint.sh reemplaza __REDIS_HOST__ con VOZIPOMNI_IPV4.
# ============================================================================
redis = __REDIS_HOST__:6379
redis-db = 5
redis-auth = __REDIS_PASSWORD__

# ============================================================================
# Timeouts de sesión
# timeout: segundos sin actividad RTP antes de terminar la sesión
# silent-timeout: timeout para sesiones silenciosas (en espera/hold)
# final-timeout: timeout máximo absoluto de una sesión (3 horas)
# ============================================================================
timeout = 60
silent-timeout = 3600
final-timeout = 10800

# ============================================================================
# Threading y rendimiento
# ============================================================================
num-threads = 4
delete-delay = 30

# ============================================================================
# Logging
# log-level: 6=info, 7=debug (usar 7 solo para troubleshooting)
# ============================================================================
log-level = 6
log-stderr = true
log-facility = daemon

# ============================================================================
# Codecs — NO restringir aquí, Kamailio maneja la negociación vía rtpengine_offer
# ============================================================================

# ============================================================================
# TOS/DSCP — marcar paquetes RTP con precedencia de voz (EF = 0xB8 = 184)
# Garantiza prioridad en routers QoS
# ============================================================================
tos = 184

# ============================================================================
# Grabación de llamadas (opcional — habilitar si se necesita grabación a nivel RTP)
# recording-dir = /var/spool/rtpengine
# recording-method = pcap
# recording-format = eth
# ============================================================================
