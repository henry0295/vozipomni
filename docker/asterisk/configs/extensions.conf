;============================================================================
; VoziPOmni Contact Center - Extensions Configuration
;
; NOTA: El archivo extensions_dynamic.conf (generado por Django) define
; contextos [from-internal] y [from-pstn] que Asterisk fusiona (merge)
; con los definidos aquí. Así las extensiones, colas y rutas salientes
; creadas desde la web quedan accesibles automáticamente.
;============================================================================

[globals]
; Variables globales

[general]
static=yes
writeprotect=no
clearglobalvars=no

; Incluir dialplan dinámico generado por el backend Django
; Define secciones [from-internal] y [from-pstn] que se fusionan con las de abajo
#include /var/lib/asterisk/dynamic/extensions_dynamic.conf

[from-internal]
; Contexto para agentes internos — las extensiones dinámicas y rutas salientes
; se agregan automáticamente por el #include de arriba (mismo nombre de contexto)

; ─── Catch-all para extensiones NO resueltas por el dialplan dinámico ─────────
; Este patrón solo se activa si el número NO fue matcheado por:
;   1. Una extensión interna (pjsip_agents.conf / extensions_dynamic.conf)
;   2. Una ruta saliente (extensions_dynamic.conf con patrón _X. o _9X., etc.)
;
; IMPORTANTE: Las rutas salientes del dialplan dinámico tienen prioridad porque
; Asterisk evalúa patrones de mayor a menor especificidad. Un patrón como _9.
; o _57. es más específico que _X. y se evalúa primero.
;
; Este catch-all NO debe hacer Dial(PJSIP/${EXTEN}) directamente porque
; PJSIP solo entiende extensiones SIP registradas, no números externos.
; Si llegamos aquí con un número externo, reportar error y colgar.
exten => _X.,1,NoOp(from-internal catch-all: ${CALLERID(num)} -> ${EXTEN})
 same => n,GotoIf($["${MIXMONITOR_STARTED}" = "1"]?noroute,1)
 same => n,Set(MIXMONITOR_STARTED=1)
 same => n,MixMonitor(${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${CALLERID(num)}-${EXTEN}.wav,ab)
 same => n(noroute),NoOp(Sin ruta para ${EXTEN} — verificar rutas salientes en la interfaz web)
 same => n,Playback(ss-noservice)
 same => n,Hangup(3)

; IVR Principal
exten => 9000,1,NoOp(IVR Principal)
 same => n,Answer()
 same => n,Playback(welcome)
 same => n,Background(main-menu)
 same => n,WaitExten(5)
 same => n,Goto(timeout,1)

exten => 1,1,Goto(queue-sales,s,1)
exten => 2,1,Goto(queue-support,s,1)
exten => 9,1,Goto(operator,s,1)

exten => timeout,1,Playback(vm-goodbye)
 same => n,Hangup()

exten => invalid,1,Playback(invalid)
 same => n,Goto(9000,2)

[from-external]
; Contexto para llamadas externas (legacy)
exten => _X.,1,NoOp(Llamada externa desde ${CALLERID(num)})
 same => n,Set(CALLERID(name)=External)
 same => n,Goto(from-pstn,${EXTEN},1)

;============================================================================
; CONTEXTO FROM-PSTN - Llamadas entrantes desde troncales PSTN/ITSP
; OmniLeads: Las llamadas de la PSTN entran por este contexto
; Las rutas entrantes (DIDs) se configuran desde la interfaz web
;============================================================================
[from-pstn]
; Las llamadas entrantes buscan primero una ruta DID configurada en extensions_dynamic.conf
; (incluido al inicio de extensions.conf via #include).
; Si no hay DID configurado para el número destino, se enruta al IVR principal.
; NOTA: Se eliminó AGI(agi://localhost:4573/inbound_route) — el servidor AGI no existe
; en este proyecto. El enrutamiento dinámico de DIDs lo maneja extensions_dynamic.conf.
exten => _X.,1,NoOp(Llamada PSTN entrante: ${CALLERID(num)} -> ${EXTEN})
 same => n,Set(CALLERID(name)=${CALLERID(num)})
 same => n,Set(__TRUNK_NAME=${CHANNEL(pjsip,endpoint)})
 same => n,MixMonitor(${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${CALLERID(num)}-${EXTEN}.wav,ab)
 same => n,Goto(from-internal,9000,1)
 same => n,Hangup()

; Extensión especial para cuando no hay match
exten => s,1,NoOp(Llamada PSTN sin DID)
 same => n,Goto(from-internal,9000,1)

;============================================================================
; CONTEXTO FROM-PBX - Llamadas entrantes desde PBX en LAN
; OmniLeads: Las llamadas desde una PBX corporativa entran aquí
; Permite contactar directamente a agentes (no solo campañas)
;============================================================================
[from-pbx]
; Llamadas desde PBX pueden ir directamente a extensiones de agentes
exten => _1XXX,1,NoOp(Llamada PBX a agente ${EXTEN})
 same => n,Set(CALLERID(name)=PBX-${CALLERID(num)})
 same => n,MixMonitor(${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${CALLERID(num)}-${EXTEN}.wav,ab)
 same => n,Dial(PJSIP/${EXTEN},30,tr)
 same => n,VoiceMail(${EXTEN}@default,u)
 same => n,Hangup()

; Llamadas PBX que no son a extensiones, ir al enrutamiento dinámico/IVR
exten => _X.,1,NoOp(Llamada PBX entrante: ${CALLERID(num)} -> ${EXTEN})
 same => n,Set(CALLERID(name)=PBX-${CALLERID(num)})
 same => n,MixMonitor(${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${CALLERID(num)}-${EXTEN}.wav,ab)
 same => n,Goto(from-internal,9000,1)
 same => n,Hangup()

;============================================================================
; CONTEXTO FROM-TRUNK - Contexto genérico para otras troncales
;============================================================================
[from-trunk]
exten => _X.,1,Goto(from-pstn,${EXTEN},1)

[queue-sales]
exten => s,1,NoOp(Cola de Ventas)
 same => n,Answer()
 same => n,Queue(sales,t,,,300)
 same => n,Hangup()

[queue-support]
exten => s,1,NoOp(Cola de Soporte)
 same => n,Answer()
 same => n,Queue(support,t,,,300)
 same => n,Hangup()

[operator]
exten => s,1,NoOp(Operador)
 same => n,Dial(PJSIP/1000,30)
 same => n,Hangup()

;============================================================================
; CONTEXTO FROM-SPY - Supervisión de llamadas (espía / susurro / barge)
;
; El backend Django origina una llamada al supervisor con:
;   Channel:  PJSIP/<supervisor_ext>
;   Context:  from-spy
;   Exten:    s
;   Variable: SPY_CHANNEL=<canal_activo>,SPY_MODE=<listen|whisper|barge>
;
; Modos ChanSpy:
;   listen  → solo escucha (opciones 'q')
;   whisper → el agente escucha al supervisor, el contacto no (opciones 'qw')
;   barge   → todos escuchan al supervisor (opción 'B')
;============================================================================
[from-spy]
exten => s,1,NoOp(Supervisor ${CALLERID(num)} - modo ${SPY_MODE} - canal ${SPY_CHANNEL})
 same => n,Answer()
 same => n,Wait(1)
 same => n,GotoIf($["${SPY_CHANNEL}" = ""]?nospy,1)
 same => n,GotoIf($["${SPY_MODE}" = "whisper"]?whisper,1)
 same => n,GotoIf($["${SPY_MODE}" = "barge"]?barge,1)
 same => n,ChanSpy(${SPY_CHANNEL},q)
 same => n,Hangup()

exten => whisper,1,ChanSpy(${SPY_CHANNEL},qw)
 same => n,Hangup()

exten => barge,1,ChanSpy(${SPY_CHANNEL},B)
 same => n,Hangup()

exten => nospy,1,Playback(vm-goodbye)
 same => n,Hangup()

;============================================================================
; CONTEXTO CONFBRIDGE - Conferencia de 3 vías para supervisores
; El backend origina canales hacia este contexto via AMI para conferencias.
; La extensión es el ID de conferencia dinámico generado por el backend.
;============================================================================
[confbridge]
exten => _X.,1,NoOp(ConfBridge ID: ${EXTEN})
 same => n,Answer()
 same => n,ConfBridge(${EXTEN})
 same => n,Hangup()

;============================================================================
; CONTEXTO OUTBOUND-QUEUE - Llamadas salientes del dialer predictivo
; El dialer engine origina llamadas aquí via AMI Originate.
; Al contestar el contacto, la llamada se pone en espera hasta que
; un agente disponible se conecta desde la cola correspondiente.
;============================================================================
[outbound-queue]
exten => s,1,NoOp(Dialer predictivo - campaña ${CAMPAIGN_ID} - contacto ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,GotoIf($["${QUEUE_NAME}" = ""]?noqueue,1)
 same => n,Queue(${QUEUE_NAME},tT,,,${QUEUE_MAX_WAIT:-180})
 same => n,Hangup()

exten => noqueue,1,NoOp(Sin cola configurada para campaña ${CAMPAIGN_ID})
 same => n,Playback(vm-goodbye)
 same => n,Hangup()
