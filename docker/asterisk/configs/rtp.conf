;============================================================================
; VoziPOmni Contact Center - RTP Configuration
;============================================================================

[general]
rtpstart=10000
rtpend=10300
rtpchecksums=no
dtmftimeout=3000
rtcpinterval=5000
; Con RTPEngine como media proxy, 'strict' descarta los primeros paquetes legítimos
; mientras se completa la negociación ICE → sin audio. Usar 'soft' (aprende la fuente).
strictrtp=soft
icesupport=yes
stunaddr=stun.l.google.com:19302
turnaddr=
turnusername=
turnpassword=
