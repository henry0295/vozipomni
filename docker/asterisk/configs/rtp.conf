;============================================================================
; VoziPOmni Contact Center - RTP Configuration
;============================================================================
;
; ARQUITECTURA: Kamailio → RTPEngine → Asterisk
;
; En esta arquitectura, RTPEngine es el proxy de medios entre el browser
; WebRTC y Asterisk. Asterisk recibe RTP plano (UDP, sin DTLS/ICE) desde
; RTPEngine. Por eso:
;
; - icesupport=yes   : Asterisk puede generar candidatos ICE si se necesita
;                      en comunicaciones directas (extensiones internas).
;                      Para llamadas via RTPEngine, ICE se elimina del SDP
;                      en Kamailio antes de llegar a Asterisk.
;
; - strictrtp=soft   : CRÍTICO. Con 'strict', Asterisk descarta los primeros
;                      paquetes RTP de una fuente desconocida hasta validarla
;                      (aprende la fuente en ~2s de silencio). Con RTPEngine
;                      como proxy, la IP fuente del RTP es RTPEngine, no el
;                      browser → los primeros paquetes pueden llegar de una
;                      IP diferente al SDP → sin audio los primeros segundos.
;                      'soft' aprende la fuente inmediatamente.
;
; - stunaddr         : NO usar STUN en Asterisk cuando hay RTPEngine.
;                      RTPEngine maneja ICE/STUN para el browser.
;                      STUN en Asterisk causaría conflicto de candidatos ICE
;                      e interferencia con la negociación SDP.
;
;============================================================================

[general]
; Rango de puertos RTP de Asterisk.
; RTPEngine usa 23000-23300, así que Asterisk usa un rango diferente
; para evitar conflictos de binding en network_mode:host.
rtpstart=10000
rtpend=10300

; No verificar checksums RTP (reduce overhead, común en entornos VoIP)
rtpchecksums=no

; Timeout DTMF (ms)
dtmftimeout=3000

; Intervalo RTCP (ms)
rtcpinterval=5000

; CRÍTICO: 'soft' en lugar de 'strict' — ver comentario arriba
strictrtp=soft

; ICE habilitado para comunicaciones directas entre extensiones internas
icesupport=yes

; NO usar STUN — RTPEngine maneja ICE/STUN para el browser WebRTC
; stunaddr=stun.l.google.com:19302  ← comentado intencionalmente
