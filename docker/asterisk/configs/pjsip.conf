;============================================================================
; VoziPOmni Contact Center - PJSIP Configuration
;============================================================================
; NOTA IMPORTANTE: Asterisk escucha en 5080 (interno desde Kamailio)
;                  Kamailio escucha en 5060 (externo desde clientes)
;============================================================================

; NOTA: los #tryinclude de archivos dinámicos van al FINAL del archivo,
; DESPUÉS de declarar los templates (webrtc_endpoint, sip_endpoint).
; Si se ponen aquí, Asterisk intenta aplicar herencia antes de que
; los templates existan → WARNING 'category does not exist'.

[global]
type=global
max_forwards=70
user_agent=VoziPOmni-Asterisk
default_outbound_endpoint=default_outbound

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5080
tos=cs3
cos=3
allow_reload=yes

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5080
tos=cs3
cos=3

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
tos=cs3
cos=3
cert_file=/etc/asterisk/keys/asterisk.pem
priv_key_file=/etc/asterisk/keys/asterisk.key
cipher=ECDHE-RSA-AES128-GCM-SHA256
cipher=ECDHE-ECDSA-AES128-GCM-SHA256
cipher=ECDHE-RSA-AES256-GCM-SHA384
cipher=ECDHE-ECDSA-AES256-GCM-SHA384
method=tlsv1_2

; Template para agentes WebRTC
; CODECS: solo ulaw/alaw — los browsers WebRTC soportan PCMU/PCMA obligatoriamente
; (RFC 7874). Evita la ruta de traducción opus→ulaw que requiere codec_opus.so.
[webrtc_endpoint](!)
type=endpoint
transport=transport-wss
context=from-internal
disallow=all
allow=ulaw,alaw
webrtc=yes
dtls_auto_generate_cert=yes
dtls_verify=fingerprint
dtls_setup=actpass
ice_support=yes
media_encryption=dtls
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
direct_media=no
identify_by=username,auth_username

; Template para agentes SIP tradicional
[sip_endpoint](!)
type=endpoint
transport=transport-udp
context=from-internal
disallow=all
allow=ulaw,alaw,g722,gsm
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
identify_by=username,auth_username

; Ejemplo de agente WebRTC
[agent1000](webrtc_endpoint)
auth=agent1000-auth
aors=agent1000-aor

[agent1000-auth]
type=auth
auth_type=userpass
username=agent1000
password=VoziPOmni2026!

[agent1000-aor]
type=aor
max_contacts=1
remove_existing=yes

; Configuración para troncales SIP (ejemplo)
[trunk_provider](!)
type=endpoint
context=from-external
transport=transport-udp
disallow=all
allow=ulaw,alaw
direct_media=no

;============================================================================
; ENDPOINT PARA KAMAILIO (Proxy SIP interno)
; Arquitectura OmniLeads: Kamailio recibe WebRTC de los agentes y reenvía
; los INVITEs a Asterisk en UDP:5080. Sin este endpoint, Asterisk rechaza
; todas las llamadas entrantes desde Kamailio con 401/403.
;
; PROD  (network_mode: host):  Kamailio → Asterisk en 127.0.0.1:5080
; DEV   (bridge network):       Kamailio → Asterisk en 172.25.x.x:5080
;============================================================================
[kamailio-endpoint]
type=endpoint
transport=transport-udp
context=from-internal
disallow=all
; Solo G.711 — coincide con lo que aceptan las troncales SIP y los browsers WebRTC.
; Elimina la necesidad de traducción opus↔ulaw (codec_opus.so no incluido).
allow=ulaw,alaw
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
; Confiar en la identidad indicada por Kamailio (P-Asserted-Identity)
trust_id_inbound=yes
send_pai=yes

[kamailio-endpoint-aor]
type=aor
max_contacts=5

[kamailio-endpoint-identify]
type=identify
endpoint=kamailio-endpoint
; Producción (network_mode: host): Kamailio y Asterisk comparten loopback
match=127.0.0.1/32
; Desarrollo (bridge Docker): subnet configurada en SUBNET del .env
match=172.25.0.0/16
; Aceptar también desde la IP pública del servidor (si NAT_IPV4 distinto)
; Añadir aquí la IP de Kamailio si usa dirección externa

;============================================================================
; TRANSPORTS PARA TRONCALES SIP
; Siguiendo la arquitectura de OmniLeads:
; - trunk-nat-transport: Puerto 5162 con NAT (IP pública en external_*)
; - trunk-transport: Puerto 5161 sin NAT (VPS con IP pública o LAN)
;============================================================================

; Transport específico para troncales con NAT
; Usa puerto 5162 (como OmniLeads) para evitar conflicto con transport-udp
; IMPORTANTE: external_media_address y external_signaling_address son
; inyectados automáticamente por entrypoint.sh usando VOZIPOMNI_IPV4.
; NO definirlos vacíos aquí o Asterisk fallará al cargar el transport.
[trunk-nat-transport]
type=transport
protocol=udp
bind=0.0.0.0:5162
; external_media_address= (inyectado por entrypoint.sh)
; external_signaling_address= (inyectado por entrypoint.sh)
local_net=192.168.0.0/16
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=172.20.0.0/16
local_net=100.64.0.0/10
tos=cs3
cos=3

; Transport para troncales sin NAT (VPS con IP pública, PBX en LAN, corporativo)
; Usa puerto 5161 (como OmniLeads) para evitar conflicto con transport-udp
[trunk-transport]
type=transport
protocol=udp
bind=0.0.0.0:5161
tos=cs3
cos=3

