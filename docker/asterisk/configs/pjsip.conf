;============================================================================
; VoziPOmni Contact Center - PJSIP Configuration
;============================================================================
; NOTA IMPORTANTE: Asterisk escucha en 5080 (interno desde Kamailio)
;                  Kamailio escucha en 5060 (externo desde clientes)
;============================================================================

; NOTA: los #tryinclude de archivos dinámicos van al FINAL del archivo,
; DESPUÉS de declarar los templates (webrtc_endpoint, sip_endpoint).
; Si se ponen aquí, Asterisk intenta aplicar herencia antes de que
; los templates existan → WARNING 'category does not exist'.

[global]
type=global
max_forwards=70
user_agent=VoziPOmni-Asterisk
default_outbound_endpoint=default_outbound

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5080
tos=cs3
cos=3
allow_reload=yes

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5080
tos=cs3
cos=3

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
tos=cs3
cos=3
cert_file=/etc/asterisk/keys/asterisk.pem
priv_key_file=/etc/asterisk/keys/asterisk.key
cipher=ECDHE-RSA-AES128-GCM-SHA256
cipher=ECDHE-ECDSA-AES128-GCM-SHA256
cipher=ECDHE-RSA-AES256-GCM-SHA384
cipher=ECDHE-ECDSA-AES256-GCM-SHA384
method=tlsv1_2

; Template para agentes WebRTC
;
; ARQUITECTURA: Browser → Kamailio (WSS) → RTPEngine (DTLS↔RTP bridge) → Asterisk (RTP plano)
;
; El browser se conecta via WebSocket a Kamailio, NO directamente a Asterisk.
; RTPEngine convierte DTLS/ICE/SRTP del browser a RTP plano para Asterisk.
; Por eso Asterisk recibe RTP plano (sin DTLS, sin ICE) desde RTPEngine.
;
; CRÍTICO: NO usar webrtc=yes ni media_encryption=dtls en este template.
; Si se ponen, Asterisk espera DTLS del lado del media pero recibe RTP plano
; de RTPEngine → handshake DTLS nunca completa → SIN AUDIO.
;
; Los settings webrtc=yes/dtls/ice son para conexión WebRTC DIRECTA a Asterisk
; (sin Kamailio/RTPEngine como proxy). En esta arquitectura van en Kamailio.
;
[webrtc_endpoint](!)
type=endpoint
; Asterisk recibe los INVITE de agentes re-enviados por Kamailio via UDP:5080
transport=transport-udp
context=from-internal
disallow=all
; G.711 solamente — browsers WebRTC soportan PCMU/PCMA obligatoriamente (RFC 7874)
; RTPEngine hace el bridge DTLS↔RTP sin cambiar codec
allow=ulaw,alaw
; NO webrtc=yes — ver explicación arriba
; NO media_encryption=dtls
; NO ice_support=yes — RTPEngine elimina ICE del SDP antes de llegar a Asterisk
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
; Confiar en el CallerID que envía Kamailio (P-Asserted-Identity)
trust_id_inbound=yes
identify_by=username,auth_username

; Template para agentes SIP tradicional
[sip_endpoint](!)
type=endpoint
transport=transport-udp
context=from-internal
disallow=all
allow=ulaw,alaw,g722,gsm
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
identify_by=username,auth_username

; NOTA: Los agentes se generan dinámicamente desde el backend Django.
; Ver /var/lib/asterisk/dynamic/pjsip_agents.conf (generado por signals.py)
; No definir agentes estáticos aquí — se crean desde la interfaz web.

;============================================================================
; ENDPOINT PARA KAMAILIO (Proxy SIP interno)
; Arquitectura OmniLeads: Kamailio recibe WebRTC de los agentes y reenvía
; los INVITEs a Asterisk en UDP:5080. Sin este endpoint, Asterisk rechaza
; todas las llamadas entrantes desde Kamailio con 401/403.
;
; PROD  (network_mode: host):  Kamailio → Asterisk en 127.0.0.1:5080
; DEV   (bridge network):       Kamailio → Asterisk en 172.25.x.x:5080
;============================================================================
[kamailio-endpoint]
type=endpoint
transport=transport-udp
context=from-internal
disallow=all
; Solo G.711 — coincide con lo que aceptan las troncales SIP y los browsers WebRTC.
; Elimina la necesidad de traducción opus↔ulaw (codec_opus.so no incluido).
allow=ulaw,alaw
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
; Confiar en la identidad indicada por Kamailio (P-Asserted-Identity)
trust_id_inbound=yes
send_pai=yes

[kamailio-endpoint-aor]
type=aor
max_contacts=5

[kamailio-endpoint-identify]
type=identify
endpoint=kamailio-endpoint
; IMPORTANTE: ${ENV(VOZIPOMNI_IPV4)} NO funciona en pjsip.conf — el parser de
; res_pjsip_endpoint_identifier_ip no interpreta macros de entorno.
; El entrypoint.sh reemplaza este literal con la IP real via sed en arranque.
; Si ves "Invalid IP address: ${ENV(...)}" en los logs, el contenedor no recibió
; VOZIPOMNI_IPV4 como variable de entorno al arrancar.
match=${ENV(VOZIPOMNI_IPV4)}/32
; Fallback loopback (cuando Kamailio corre en el mismo host)
match=127.0.0.1/32
; Fallback Docker bridge (si en algún despliegue Kamailio usa red bridge)
match=172.25.0.0/16

;============================================================================
; TRANSPORTS PARA TRONCALES SIP
; Siguiendo la arquitectura de OmniLeads:
; - trunk-nat-transport: Puerto 5162 con NAT (IP pública en external_*)
; - trunk-transport: Puerto 5161 sin NAT (VPS con IP pública o LAN)
;============================================================================

; Transport específico para troncales con NAT
; Usa puerto 5162 (como OmniLeads) para evitar conflicto con transport-udp
; IMPORTANTE: external_media_address y external_signaling_address son
; inyectados automáticamente por entrypoint.sh usando VOZIPOMNI_IPV4.
; NO definirlos vacíos aquí o Asterisk fallará al cargar el transport.
[trunk-nat-transport]
type=transport
protocol=udp
bind=0.0.0.0:5162
; external_media_address= (inyectado por entrypoint.sh)
; external_signaling_address= (inyectado por entrypoint.sh)
local_net=192.168.0.0/16
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=172.20.0.0/16
local_net=100.64.0.0/10
tos=cs3
cos=3

; Transport para troncales sin NAT (VPS con IP pública, PBX en LAN, corporativo)
; Usa puerto 5161 (como OmniLeads) para evitar conflicto con transport-udp
[trunk-transport]
type=transport
protocol=udp
bind=0.0.0.0:5161
tos=cs3
cos=3

;============================================================================
; CONFIGURACIÓN DINÁMICA
; Estos archivos son generados automáticamente desde la interfaz web
;============================================================================

; Extensiones PJSIP de agentes (generado por AsteriskConfigGenerator)
#include /var/lib/asterisk/dynamic/pjsip_extensions.conf

; Nota: Las troncales wizard se cargan desde /etc/asterisk/pjsip_wizard.conf
; (leído directamente por res_pjsip_config_wizard.so)

;============================================================================
; ARCHIVOS DINÁMICOS QUE USAN TEMPLATES (van AL FINAL, después de los templates)
; pjsip_agents.conf referencia [webrtc_endpoint](!) y [sip_endpoint](!) que
; están definidos arriba en este mismo archivo.
;============================================================================
#tryinclude "/var/lib/asterisk/dynamic/pjsip_agents.conf"
#tryinclude "/var/lib/asterisk/dynamic/pjsip_wizard.conf"
