#!KAMAILIO
# Kamailio Configuration for VozipOmni WebRTC Support

####### Defined Values #########

# Flag definitions
#!define FLT_ACC 1
#!define FLT_ACCMISSED 2
#!define FLT_ACCFAILED 3
#!define FLT_NATS 5

#!define FLB_NATB 6
#!define FLB_NATSIPPING 7

####### Global Parameters #########

debug=2
log_stderror=yes
memdbg=5
memlog=5

fork=yes
children=4

# Aliases - Cambiar por tu dominio
# alias="vozipomnirt.com"

# Listening interfaces
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
listen=tls:0.0.0.0:5061
listen=tcp:0.0.0.0:8080

# TLS Configuration
enable_tls=yes
tls_port_no=5061

# TCP/HTTP Configuration
tcp_accept_no_cl=yes

####### Modules Section ########

loadmodule "jsonrpcs.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "cfg_rpc.so"
loadmodule "acc.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "db_redis.so"
loadmodule "tls.so"
loadmodule "xhttp.so"
loadmodule "websocket.so"
loadmodule "nathelper.so"
loadmodule "rtpengine.so"

####### Module Parameters ########

# ----- tls params -----
# Configuración TLS para WebRTC (WSS en puerto 5061)
# Los certificados son generados por entrypoint.sh en el arranque del contenedor.
modparam("tls", "config_file", "/etc/kamailio/tls.cfg")

# ----- usrloc params -----
modparam("usrloc", "db_mode", 0)
modparam("usrloc", "use_domain", 0)
modparam("usrloc", "nat_bflag", FLB_NATSIPPING)

# ----- registrar params -----
modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_expires", 3600)
modparam("registrar", "min_expires", 60)
modparam("registrar", "received_avp", "$avp(RECEIVED)")

# ----- nathelper params -----
modparam("nathelper", "received_avp", "$avp(RECEIVED)")
modparam("nathelper", "natping_interval", 30)
modparam("nathelper", "ping_nated_only", 1)
modparam("nathelper", "sipping_bflag", FLB_NATSIPPING)
modparam("nathelper", "sipping_from", "sip:keepalive@vozipomnirt.com")

# ----- rtpengine params -----
modparam("rtpengine", "rtpengine_sock", "udp:RTPENGINE_HOST_PLACEHOLDER:22222")

# ----- websocket params -----
modparam("websocket", "keepalive_mechanism", 1)
modparam("websocket", "keepalive_timeout", 30)
modparam("websocket", "keepalive_processes", 1)
modparam("websocket", "keepalive_interval", 5)

####### Routing Logic ########

# Main SIP request routing logic
request_route {
    # Per request initial checks
    route(REQINIT);
    
    # NAT detection
    route(NATDETECT);
    
    # Handle requests within SIP dialogs
    route(WITHINDLG);
    
    # Handle registrations
    route(REGISTRAR);
    
    # Si el destino es un agente registrado (INVITE desde Asterisk hacia agente WebRTC),
    # hacer lookup en la tabla de ubicaciones y enrutar al browser del agente.
    # Esto ocurre cuando Asterisk origina PJSIP/{ext} con contact=sip:{ext}@kamailio:5060.
    route(TOAGENT);
    
    # Handle routing to Asterisk (INVITE desde agentes hacia el exterior)
    route(RELAY);
}

# Handle initial requests
route[REQINIT] {
    if($ua =~ "friendly-scanner|sipcli|VaxSIPUserAgent") {
        sl_send_reply("200", "OK");
        exit;
    }
    
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483","Too Many Hops");
        exit;
    }
    
    if(is_method("OPTIONS") && uri==myself && $rU==$null) {
        sl_send_reply("200","Keepalive");
        exit;
    }
    
    if(!sanity_check("1511", "7")) {
        xlog("Malformed SIP message from $si:$sp\n");
        exit;
    }
}

# Caller NAT detection
route[NATDETECT] {
    force_rport();
    if (nat_uac_test("19")) {
        if (is_method("REGISTER")) {
            fix_nated_register();
        } else {
            if(is_first_hop()) {
                set_contact_alias();
            }
        }
        setflag(FLT_NATS);
    }
    return;
}

# Handle requests within SIP dialogs
route[WITHINDLG] {
    if (!has_totag()) return;
    
    if (loose_route()) {
        route(DLGURI);
        if (is_method("BYE")) {
            setflag(FLT_ACC);
            setflag(FLT_ACCFAILED);
        } else if (is_method("ACK")) {
            route(NATMANAGE);
        } else if (is_method("NOTIFY")) {
            record_route();
        }
        route(RELAY);
        exit;
    }
    
    if (is_method("ACK")) {
        if (t_check_trans()) {
            route(RELAY);
            exit;
        } else {
            exit;
        }
    }
    
    sl_send_reply("404","Not here");
    exit;
}

# URI update for dialog requests
route[DLGURI] {
    if(!isdsturiset()) {
        handle_ruri_alias();
    }
    return;
}

# REGISTRAR - WebRTC and SIP registrations
route[REGISTRAR] {
    if (!is_method("REGISTER")) return;
    
    # WebSockets need to be handled specially
    if (proto == WS || proto == WSS) {
        xlog("L_INFO", "WebSocket REGISTER from $si:$sp\n");
        
        # Store in Redis (location table)
        if (!save("location")) {
            sl_reply_error();
        }
        exit;
    }
    
    # Regular SIP REGISTER
    if (!save("location")) {
        sl_reply_error();
    }
    exit;
}

# TOAGENT - Enrutar llamadas de Asterisk hacia agentes WebRTC registrados
# Cuando Asterisk origina INVITE hacia PJSIP/{ext} con contact sip:{ext}@kamailio:5060,
# Kamailio recibe el INVITE y debe buscar la ubicación real del browser del agente
# en la tabla de location y enrutarle el INVITE vía WebSocket.
route[TOAGENT] {
    # Solo para INVITE/MESSAGE sin to-tag (nuevos diálogos hacia extensiones locales)
    if (!is_method("INVITE|MESSAGE")) return;
    if (has_totag()) return;
    
    # Verificar si el Request-URI es un usuario local (extensión de agente)
    # Las extensiones son numéricas (ej: 100, 101, 200) — no tienen @asterisk en el URI
    # Los INVITE desde agentes hacia el exterior tienen host != nosotros
    if (!is_uri_host_local()) return;
    
    # Buscar la ubicación del agente en la tabla de registros
    if (!lookup("location")) {
        xlog("L_WARN", "Agente $rU no encontrado en location (posiblemente no registrado)\n");
        sl_send_reply("480", "Temporarily Unavailable");
        exit;
    }
    
    xlog("L_INFO", "Enrutando a agente $rU → $ru (WebRTC)\n");
    route(RELAY);
    exit;
}

# RTPEngine management
# IMPORTANTE: esta ruta se invoca desde branch_route (request) y onreply_route (reply).
# NO llamar desde route[RELAY] directamente para INVITE — causaría doble oferta a RTPEngine.
route[NATMANAGE] {
    if (is_request()) {
        if(has_totag()) {
            if(check_route_param("nat=yes")) {
                setbflag(FLB_NATB);
            }
        }
    }
    
    # Marcar para tracking de NAT
    if (!(isflagset(FLT_NATS) || isbflagset(FLB_NATB))) {
        if (is_request() && !has_totag()) {
            if(t_is_branch_route()) {
                add_rr_param(";nat=yes");
            }
        }
    } else {
        # Caso NAT detectado
        if (is_request()) {
            if (!has_totag()) {
                if(t_is_branch_route()) {
                    add_rr_param(";nat=yes");
                }
            }
        }
        
        if (is_reply()) {
            if(isbflagset(FLB_NATB)) {
                if(is_first_hop())
                    set_contact_alias();
            }
        }
    }
    
    # RTPEngine WebRTC→RTP bridge:
    #   OFFER (browser → Asterisk):
    #     ICE=remove       — quita ICE del SDP hacia Asterisk (no soporta ICE por esta vía)
    #     DTLS=off         — deshabilita DTLS hacia Asterisk (RTP plano)
    #     SDES-off         — deshabilita SDES
    #     RTP/AVP          — cambia transporte a RTP plano para Asterisk
    #     codec-strip=OPUS codec-strip=G722 — elimina codecs que Asterisk rechaza
    #       (evita que Asterisk genere m=audio port=0 adicionales en la respuesta)
    #
    #   ANSWER (Asterisk → browser):
    #     ICE=force        — fuerza adición de candidatos ICE de RTPEngine
    #     DTLS=passive     — RTPEngine usa DTLS pasivo (browser inicia handshake DTLS)
    #     RTP/SAVPF        — cambia transporte a SRTP+AVPF para WebRTC
    #     SDES-off         — desactiva SDES (solo DTLS)
    #
    #   Se usan rtpengine_offer/answer explícitos en lugar de rtpengine_manage
    #   para garantizar la dirección correcta (manage puede detectar mal en reply context).
    if (is_method("INVITE")) {
        if (t_is_branch_route()) {
            # OFFER: convertir SDP WebRTC → RTP/AVP limpio para Asterisk
            rtpengine_offer("replace-origin replace-session-connection ICE=remove DTLS=off SDES-off RTP/AVP codec-strip=OPUS codec-strip=G722");
            xlog("L_INFO", "RTPEngine offer (INVITE branch) from $si:$sp\n");
        } else if (is_reply()) {
            # ANSWER: convertir RTP/AVP de Asterisk de vuelta a WebRTC para el browser
            rtpengine_answer("replace-origin replace-session-connection ICE=force DTLS=passive RTP/SAVPF SDES-off");
            xlog("L_INFO", "RTPEngine answer (200 OK reply) from $si:$sp\n");
        }
    } else if (is_method("ACK|BYE|CANCEL")) {
        rtpengine_manage();
    }
}

# Relay to Asterisk
route[RELAY] {
    # Registrar branch_route para modificar SDP via RTPEngine ANTES de enviar a Asterisk
    if (is_method("INVITE|BYE|SUBSCRIBE|UPDATE")) {
        if(!t_is_set("branch_route")) t_on_branch("MANAGE_BRANCH");
    }
    if (is_method("INVITE|SUBSCRIBE|UPDATE")) {
        if(!t_is_set("onreply_route")) t_on_reply("MANAGE_REPLY");
    }
    if (is_method("INVITE")) {
        if(!t_is_set("failure_route")) t_on_failure("MANAGE_FAILURE");
    }
    
    # NOTA: NO llamar route(NATMANAGE) aquí para INVITE.
    # RTPEngine se invoca en branch_route[MANAGE_BRANCH] (request) y
    # onreply_route[MANAGE_REPLY] (respuesta 200 OK). Llamarlo aquí
    # causaría una doble oferta y el 500 Service Unavailable.
    #
    # Solo ejecutar RTPEngine para BYE/CANCEL en la ruta principal
    # (cuando no hay branch_route activo, p.ej. re-INVITE dentro de diálogo).
    if (is_method("BYE|CANCEL") && !t_is_branch_route()) {
        rtpengine_manage();
    }
    
    # Forward to Asterisk (puerto 5080 - Asterisk interno desde Kamailio)
    $du = "sip:ASTERISK_HOST_PLACEHOLDER:5080";
    
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

# Manage outgoing branches
# Se ejecuta justo antes de enviar el INVITE branch a Asterisk.
# Aquí se invoca RTPEngine para modificar el SDP (WebRTC → RTP/AVP).
branch_route[MANAGE_BRANCH] {
    xdbg("new branch [$T_branch_idx] to $ru\n");
    route(NATMANAGE);
}

# Manage SIP replies
# Se ejecuta al recibir 200 OK de Asterisk para el INVITE.
# RTPEngine actualiza el SDP hacia el agente WebRTC.
onreply_route[MANAGE_REPLY] {
    xdbg("incoming reply\n");
    
    if (nat_uac_test("1")) {
        fix_nated_contact();
    }
    
    # Solo invocar RTPEngine para respuestas 2xx de INVITE (no para 1xx provisionales)
    if (t_check_status("2[0-9][0-9]")) {
        route(NATMANAGE);
    }
}

# Manage failure responses
failure_route[MANAGE_FAILURE] {
    route(NATMANAGE);
    
    if (t_is_canceled()) {
        exit;
    }
}

# WebSocket event route
event_route[websocket:closed] {
    xlog("L_INFO", "WebSocket connection from $si:$sp has closed\n");
}

# HTTP request routing (for WebSocket upgrade)
event_route[xhttp:request] {
    set_reply_close();
    set_reply_no_connect();
    
    if ($Rp != 8080) {
        xlog("L_WARN", "HTTP request received on $Rp\n");
        xhttp_reply("403", "Forbidden", "", "");
        exit;
    }

    xlog("L_DBG", "HTTP Request Received\n");

    if ($hdr(Upgrade) =~ "websocket" && $hdr(Connection) =~ "Upgrade" && $rm =~ "GET") {
        # WebSocket upgrade request
        xlog("L_INFO", "WebSocket upgrade request from $si:$sp\n");
        
        if (ws_handle_handshake()) {
            exit;
        }
    }

    xhttp_reply("404", "Not Found", "", "");
}
