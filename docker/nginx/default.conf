upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# =============================================================================
# HTTP Server (siempre activo — funcional para API/Frontend)
# =============================================================================
# ATENCIÓN: WebRTC requiere HTTPS para que el browser permita el micrófono.
# Sin HTTPS, JsSIP no puede acceder al micrófono → sin audio.
# Genera certificados de desarrollo con:
#   Linux   → ./generate-dev-ssl.sh
#   Windows → .\generate-dev-ssl.ps1
# Luego reinicia nginx y accede por  https://TU_IP
# =============================================================================
server {
    listen 80;
    server_name _;
    charset utf-8;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream    http://backend:8000;
    set $frontend_upstream   http://frontend:3000;
    set $kamailio_ws_upstream http://kamailio:8080;

    client_max_body_size 100M;

    access_log /var/log/nginx/vozipomni_access.log;
    error_log  /var/log/nginx/vozipomni_error.log;

    location /api/_nuxt_icon/ {
        rewrite ^/api/_nuxt_icon/(.*) /_nuxt_icon/$1 break;
        proxy_pass $frontend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600";
    }

    location /_nuxt_icon/ {
        proxy_pass $frontend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        proxy_pass $frontend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    location /admin/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SIP WebSocket — Flujo: JsSIP → nginx → Kamailio:8080 → RTPEngine → Asterisk:5080
    location /sip/ws {
        proxy_pass $kamailio_ws_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 7d;
        proxy_send_timeout    7d;
        proxy_read_timeout    7d;
    }

    # Django Channels WebSocket
    location /ws/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 7d;
        proxy_send_timeout    7d;
        proxy_read_timeout    7d;
    }

    location /static/ {
        alias /app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# =============================================================================
# HTTPS Server — REQUERIDO para WebRTC (micrófono + WSS)
# Activo solo cuando existan los certs en docker/nginx/ssl/
# Para generar: ./generate-dev-ssl.sh   o   .\generate-dev-ssl.ps1
# =============================================================================
server {
    listen 443 ssl;
    http2 on;
    server_name _;
    charset utf-8;

    ssl_certificate     /etc/nginx/ssl/vozipomni.crt;
    ssl_certificate_key /etc/nginx/ssl/vozipomni.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers off;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream    http://backend:8000;
    set $frontend_upstream   http://frontend:3000;
    set $kamailio_ws_upstream http://kamailio:8080;

    client_max_body_size 100M;

    access_log /var/log/nginx/vozipomni_https_access.log;
    error_log  /var/log/nginx/vozipomni_https_error.log;

    location /api/_nuxt_icon/ {
        rewrite ^/api/_nuxt_icon/(.*) /_nuxt_icon/$1 break;
        proxy_pass $frontend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "public, max-age=3600";
    }

    location /_nuxt_icon/ {
        proxy_pass $frontend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        proxy_pass $frontend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    location /admin/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # SIP WebSocket — Flujo: JsSIP (WSS) → nginx → Kamailio:8080 → RTPEngine → Asterisk:5080
    # nginx termina TLS aquí; Kamailio recibe WS plano en 8080.
    location /sip/ws {
        proxy_pass $kamailio_ws_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 7d;
        proxy_send_timeout    7d;
        proxy_read_timeout    7d;
    }

    # Django Channels WebSocket
    location /ws/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 7d;
        proxy_send_timeout    7d;
        proxy_read_timeout    7d;
    }

    location /static/ {
        alias /app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
