# Redirección HTTP -> HTTPS
server {
    listen 80;
    server_name _;
    
    # Logs
    access_log /var/log/nginx/vozipomni_http_access.log;
    error_log /var/log/nginx/vozipomni_http_error.log;
    
    # Health check endpoint (debe estar ANTES del redirect)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
    
    # Redirigir todo lo demás a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name _;

    # Certificados SSL
    ssl_certificate /etc/nginx/ssl/vozipomni.crt;
    ssl_certificate_key /etc/nginx/ssl/vozipomni.key;

    # Configuración SSL moderna y segura
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # HSTS (opcional, comentar si no se quiere)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # Variables para proxy_pass
    # IMPORTANTE: Usar 127.0.0.1 porque todos los servicios usan network_mode: host
    # Con network_mode: host NO funcionan nombres de servicios Docker (backend, frontend)
    set $backend_upstream http://127.0.0.1:8000;
    set $frontend_upstream http://127.0.0.1:3000;
    
    # Límites de tamaño
    client_max_body_size 100M;
    
    # Compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Logs
    access_log /var/log/nginx/vozipomni_access.log;
    error_log /var/log/nginx/vozipomni_error.log;

    # Iconos de Nuxt desde /api/_nuxt_icon/ - reescribir y enviar al frontend
    location /api/_nuxt_icon/ {
        rewrite ^/api/_nuxt_icon/(.*) /_nuxt_icon/$1 break;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # Cache para JSON de iconos
        add_header Cache-Control "public, max-age=3600";
    }

    # Iconos de Nuxt directos
    location /_nuxt_icon/ {
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # Cache para JSON de iconos
        add_header Cache-Control "public, max-age=3600";
    }

    # Archivos estáticos de Nuxt (_nuxt/)
    location ~* ^/_nuxt/ {
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # Cache agresivo para archivos estáticos
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend (Nuxt 3)
    location / {
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # API Backend
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # Timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Admin Django
    location /admin/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # WebSocket connections (WSS)
    location /ws/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        proxy_read_timeout 86400;
    }

    # Archivos estáticos de Django
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Archivos de medios
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Grabaciones de llamadas
    location /recordings/ {
        alias /app/recordings/;
        expires 7d;
        add_header Cache-Control "private";
        
        # Autenticación requerida (manejar en Django)
        proxy_pass $backend_upstream;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
