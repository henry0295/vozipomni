# =============================================================================
# VoziPOmni Contact Center — Docker Compose PRODUCCION SEGURO
# =============================================================================
# Versión corregida con:
# - Network isolation (solo VoIP usa network_mode: host)
# - Límites de memoria para prevenir OOM
# - Puertos internos NO expuestos al host
# - Versiones pinneadas de imágenes
# =============================================================================

# ─── YAML Templates (Anchors) ────────────────────────────────────────────────
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "5"
    tag: "{{.Name}}"

x-restart-policy: &restart-policy
  restart: unless-stopped

x-healthcheck-http: &healthcheck-http
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 60s

x-healthcheck-tcp: &healthcheck-tcp
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 30s

# ─── Django production env ──────────────────────────────────────────────────
x-django-env: &django-env
  DEBUG: "False"
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY requerido en .env}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
  CORS_ORIGINS: ${CORS_ORIGINS:-https://${VOZIPOMNI_IPV4:-localhost}}
  DB_NAME: ${POSTGRES_DB:-vozipomni}
  DB_USER: ${POSTGRES_USER:-vozipomni_user}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-vozipomni_db_2026}
  DB_HOST: postgres  # ← Cambiado de ${VOZIPOMNI_IPV4} a nombre de servicio
  DB_PORT: "5432"
  DATABASE_URL: postgresql://${POSTGRES_USER:-vozipomni_user}:${POSTGRES_PASSWORD:-vozipomni_db_2026}@postgres:5432/${POSTGRES_DB:-vozipomni}
  REDIS_URL: redis://:${REDIS_PASSWORD:-vozipomni_redis_2026}@redis:6379/0
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-vozipomni_redis_2026}@redis:6379/0
  CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-vozipomni_redis_2026}@redis:6379/1
  ASTERISK_HOST: ${VOZIPOMNI_IPV4:-127.0.0.1}
  ASTERISK_AMI_PORT: "5038"
  ASTERISK_AMI_USER: ${ASTERISK_AMI_USER:-admin}
  ASTERISK_AMI_PASSWORD: ${ASTERISK_AMI_PASSWORD:-vozipomni_ami_2026}
  ASTERISK_CONFIG_DIR: /var/lib/asterisk/dynamic
  ASTERISK_PUBLIC_IP: ${VOZIPOMNI_IPV4:-127.0.0.1}
  KAMAILIO_HOST: ${KAMAILIO_HOST:-127.0.0.1}
  EMAIL_HOST: ${EMAIL_HOST:-}
  EMAIL_PORT: ${EMAIL_PORT:-587}
  EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  TZ: ${TZ:-America/Bogota}

# ─── Django common service ──────────────────────────────────────────────────
x-django-common: &django-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  dns: 8.8.8.8
  <<: *restart-policy
  logging: *default-logging
  networks:
    - backend
    - voip_bridge

# =============================================================================
# SERVICES
# =============================================================================
services:

  # ──────────────────────────────────────────────────────────────────────────
  # DATA STORES (PostgreSQL, Redis) — AISLADOS con network bridge
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:14-alpine  # ✅ Versión pinneada
    container_name: vozipomni_postgres
    dns: 8.8.8.8
    networks:
      - backend
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vozipomni}
      POSTGRES_USER: ${POSTGRES_USER:-vozipomni_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vozipomni_db_2026}
      TZ: ${TZ:-America/Bogota}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vozipomni_user} -d ${POSTGRES_DB:-vozipomni} -q"]
      <<: *healthcheck-tcp
    <<: *restart-policy
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M

  redis:
    image: redis:7-alpine  # ✅ Versión pinneada
    container_name: vozipomni_redis
    dns: 8.8.8.8
    networks:
      - backend
    command: redis-server --requirepass ${REDIS_PASSWORD:-vozipomni_redis_2026} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-vozipomni_redis_2026}", "ping"]
      <<: *healthcheck-tcp
    <<: *restart-policy
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ──────────────────────────────────────────────────────────────────────────
  # DJANGO BACKEND — AISLADO, expone solo al proxy inverso
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    <<: *django-common
    container_name: vozipomni_backend
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput --clear &&
        gunicorn config.wsgi:application
          --bind 0.0.0.0:8000
          --workers 4
          --threads 2
          --timeout 120
          --access-logfile -
          --error-logfile -
          --log-level info
      "
    environment:
      <<: *django-env
    volumes:
      - ./backend:/app
      - static_volume:/app/static
      - media_volume:/app/media
      - asterisk_dynamic_config:/var/lib/asterisk/dynamic
      - recordings:/app/recordings
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      <<: *healthcheck-http
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M

  # ──────────────────────────────────────────────────────────────────────────
  # CELERY WORKERS — AISLADOS
  # ──────────────────────────────────────────────────────────────────────────
  celery_worker:
    <<: *django-common
    container_name: vozipomni_celery_worker
    command: celery -A config worker --loglevel=info --concurrency=4 --max-tasks-per-child=100
    environment:
      <<: *django-env
    volumes:
      - ./backend:/app
      - media_volume:/app/media
      - recordings:/app/recordings
    depends_on:
      - backend
      - redis
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'

  celery_beat:
    <<: *django-common
    container_name: vozipomni_celery_beat
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      <<: *django-env
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ──────────────────────────────────────────────────────────────────────────
  # WEBSOCKET SERVER — AISLADO
  # ──────────────────────────────────────────────────────────────────────────
  websocket:
    build:
      context: ./websocket_server
      dockerfile: Dockerfile
    container_name: vozipomni_websocket
    dns: 8.8.8.8
    networks:
      - backend
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-vozipomni_redis_2026}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY requerido}
      PORT: "8765"
    command: python server.py
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8765"]
      <<: *healthcheck-tcp
    <<: *restart-policy
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ──────────────────────────────────────────────────────────────────────────
  # FRONTEND (Nuxt SSR) — AISLADO
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: vozipomni_frontend
    dns: 8.8.8.8
    networks:
      - backend
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-https://${VOZIPOMNI_IPV4:-localhost}}
      NUXT_PUBLIC_WS_BASE: ${NUXT_PUBLIC_WS_BASE:-wss://${VOZIPOMNI_IPV4:-localhost}}
      NUXT_PUBLIC_KAMAILIO_WS: ${NUXT_PUBLIC_KAMAILIO_WS:-wss://${VOZIPOMNI_IPV4:-localhost}:8080/ws}
      NUXT_PUBLIC_KAMAILIO_HOST: ${VOZIPOMNI_IPV4:-localhost}
      NUXT_PUBLIC_KAMAILIO_PORT: "5080"
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      <<: *healthcheck-http
    <<: *restart-policy
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # ──────────────────────────────────────────────────────────────────────────
  # NGINX — AISLADO, expone solo 80/443 al host
  # ──────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine  # ✅ Versión pinneada
    container_name: vozipomni_nginx
    dns: 8.8.8.8
    networks:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    <<: *restart-policy
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ──────────────────────────────────────────────────────────────────────────
  # VOIP SERVICES — network_mode: host (rendimiento RTP crítico)
  # ──────────────────────────────────────────────────────────────────────────
  asterisk:
    build:
      context: ./docker/asterisk
      dockerfile: Dockerfile.prebuilt
      args:
        ASTERISK_VERSION: "21.5.0"  # ✅ Versión pinneada
    container_name: vozipomni_asterisk
    dns: 8.8.8.8
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    environment:
      ASTERISK_PUBLIC_IP: ${VOZIPOMNI_IPV4:?VOZIPOMNI_IPV4 requerido}
      ASTERISK_LOCAL_NET: ${ASTERISK_LOCAL_NET:-192.168.0.0/16}
      TZ: ${TZ:-America/Bogota}
      AMI_USER: ${ASTERISK_AMI_USER:-admin}
      AMI_PASSWORD: ${ASTERISK_AMI_PASSWORD:-vozipomni_ami_2026}
    volumes:
      - ./docker/asterisk/configs:/etc/asterisk:rw
      - asterisk_dynamic_config:/var/lib/asterisk/dynamic:rw
      - recordings:/var/spool/asterisk/monitor:rw
      - asterisk_logs:/var/log/asterisk:rw
    <<: *restart-policy
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 4G  # ✅ CRÍTICO: Límite de memoria
          cpus: '4.0'
        reservations:
          memory: 1G

  kamailio:
    build:
      context: ./docker/kamailio
      dockerfile: Dockerfile
      args:
        KAMAILIO_VERSION: "5.7"  # ✅ Versión pinneada
    container_name: vozipomni_kamailio
    dns: 8.8.8.8
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      KAMAILIO_PUBLIC_IP: ${VOZIPOMNI_IPV4:?VOZIPOMNI_IPV4 requerido}
      KAMAILIO_ADVERTISED_IP: ${VOZIPOMNI_IPV4}
      ASTERISK_IP: 127.0.0.1
      RTPENGINE_IP: 127.0.0.1
      TZ: ${TZ:-America/Bogota}
    volumes:
      - ./docker/kamailio:/etc/kamailio:ro
      - kamailio_logs:/var/log/kamailio:rw
    depends_on:
      - asterisk
    <<: *restart-policy
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'

  rtpengine:
    build:
      context: ./docker/rtpengine
      dockerfile: Dockerfile
    container_name: vozipomni_rtpengine
    dns: 8.8.8.8
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      RTPENGINE_INTERFACE: ${VOZIPOMNI_IPV4:?VOZIPOMNI_IPV4 requerido}
      RTPENGINE_LISTEN_NG: 127.0.0.1:22222
      RTPENGINE_PORT_MIN: "10000"
      RTPENGINE_PORT_MAX: "20000"
      TZ: ${TZ:-America/Bogota}
    <<: *restart-policy
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  voip_bridge:
    driver: bridge

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  recordings:
  asterisk_dynamic_config:
  asterisk_logs:
  kamailio_logs:
